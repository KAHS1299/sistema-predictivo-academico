<!DOCTYPE html>
<html>
<head>
    <title>ML App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            margin-top: 90px;
            background: linear-gradient(135deg, #71e9f2, #033d3d);
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            background: #010609;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .nav-container {
            display: flex;
            gap: 40px;
        }

        .nav-btn {
            background: transparent;
            color: white;
            padding: 12px 25px;
            border-radius: 15px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }

        .nav-btn:hover {
            background: #0ab8bb;
            color: black;
        }

        /* DROPDOWN */
        .dropdown {
            position: relative;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #1c1c1c;
            border-radius: 12px;
            padding: 10px;
            min-width: 200px;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
        }

        .dropdown-menu a,
        .submenu-container span {
            display: block;
            padding: 10px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .dropdown-menu a:hover,
        .submenu-container span:hover {
            background: #0ab8bb;
            color: black;
        }

        /* SUBMENU (lado derecho) */
        .submenu-container {
            position: relative;
        }

        .submenu {
            display: none;
            position: absolute;
            left: 100%;
            top: 0;
            background: #1c1c1c;
            border-radius: 10px;
            padding: 10px;
            min-width: 180px;
        }

        .submenu-container:hover .submenu {
            display: block;
        }
    </style>
</head>

<div class="navbar">
    <div class="nav-container">

        <a href="/dashboard" class="nav-btn">Home</a>

        <!-- USE CASES -->
        <div class="dropdown">
            <button class="nav-btn">ML Use Cases ▼</button>
            <div class="dropdown-menu">
                <a href="/usecase1">Use Case 1</a>
                <a href="/usecase2">Use Case 2</a>
                <a href="/usecase3">Use Case 3</a>
                <a href="/usecase4">Use Case 4</a>
            </div>
        </div>

        <!-- Classification -->
<div class="dropdown">
    <button class="nav-btn">AdaBoost Application ▼</button>
    <div class="dropdown-menu">
        <a href="/classification_explanation">Classification explanation</a>
        <a href="/classification_application">Credit Analysis</a>
    </div>
</div>

<div class="dropdown">
    <button class="nav-btn">ML Unsupervised ▼</button>

    <div class="dropdown-menu">

        <!-- BASIC CONCEPTS -->
        <a href="{{ url_for('unsupervised_basics') }}">
            Basic Concepts
        </a>

        <!-- KMEANS -->
        <div class="submenu-container">
            <span>K-Means ▶</span>
            <div class="submenu">
                <a href="{{ url_for('kmeans_manual') }}">Manual Exercise</a>
                <a href="{{ url_for('kmeans_application') }}">Application</a>
            </div>
        </div>

    </div>
</div>
        <!-- SUPERVISED ML -->
        <div class="dropdown">
            <button class="nav-btn">Supervised ML ▼</button>
            <div class="dropdown-menu">

                <!-- LINEAR -->
                <div class="submenu-container">
                    <span>Linear Regression ▶</span>
                    <div class="submenu">
                        <a href="/linear_explanation">Explanation</a>
                        <a href="/linear_application">Application</a>
                    </div>
                </div>

                <!-- LOGISTIC -->
                <div class="submenu-container">
                    <span>Logistic Regression ▶</span>
                    <div class="submenu">
                        <a href="/logistic_explanation">Explanation</a>
                        <a href="/logistic_application">Application</a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- CONTENIDO -->
{% block content %}
{% endblock %}

</body>
</html>
