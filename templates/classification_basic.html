{% extends "base.html" %}

{% block content %}
<div style="max-width: 800px; margin: 50px auto; color: white; text-align: center;">
    <h1>¿Qué es la Clasificación?</h1>
    <p>A diferencia de la Regresión Lineal (que predice números), la Clasificación predice <b>etiquetas o categorías</b>.</p>
    <p>Ejemplos: ¿Es spam o no?, ¿El tumor es maligno o benigno?, ¿El estudiante aprueba o reprueba?</p>
</div>
{% endblock %}
