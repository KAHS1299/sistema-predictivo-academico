{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: #033d3d;">Modelo de Clasificación</h2>
    <p style="text-align: center; color: #666;">Ingresa los datos para predecir la categoría.</p>
    
    <form action="/predict_classification" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        <label>Variable 1 (ej. Edad):</label>
        <input type="number" name="feat1" step="any" required style="padding: 10px; border-radius: 10px; border: 1px solid #ccc;">
        
        <label>Variable 2 (ej. Puntuación):</label>
        <input type="number" name="feat2" step="any" required style="padding: 10px; border-radius: 10px; border: 1px solid #ccc;">
        
        <button type="submit" style="background: #0ab8bb; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold;">
            Realizar Predicción
        </button>
    </form>

    {% if result %}
    <div style="margin-top: 20px; padding: 15px; background: #e0f7f7; border-radius: 10px; text-align: center;">
        <h3>Resultado: {{ result }}</h3>
    </div>
    {% endif %}
</div>

{% endblock %}
