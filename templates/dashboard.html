<!DOCTYPE html>
<html>
<head>
    <title>Dashboard ML</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #7b2ff7, #f107a3);
            color: white;
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 15px 30px;
        }

        .navbar h2 {
            margin: 0;
        }

        .menu {
            display: flex;
            gap: 20px;
        }

        .menu a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .menu a:hover {
            background: rgba(255,255,255,0.2);
        }

        .content {
            text-align: center;
            margin-top: 80px;
        }

       .cards {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 40px;
        }

        .card {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: scale(1.05);
            background: #f1f1f1;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>ML System</h2>

    <div class="menu">
        <a href="/dashboard">Home</a>
        <a href="/usecase1">Use Cases</a>
        <a href="/linear">Linear Regression</a>
    </div>
</div>

<div class="content">
    <h1>Welcome to Machine Learning Dashboard</h1>

    <div class="cards">
        <a href="/usecase1" class="card">Use Case 1</a>
        <a href="/usecase2" class="card">Use Case 2</a>
        <a href="/usecase3" class="card">Use Case 3</a>
        <a href="/usecase4" class="card">Use Case 4</a>
        <a href="/linear" class="card">linear</a>
    </div>
</div>

</body>
</html>
