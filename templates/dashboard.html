<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Sistema Predictivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; color: #333;
        }
        .navbar {
            width: 100%; background: rgba(255, 255, 255, 0.1);
            padding: 15px 0; display: flex; justify-content: center; gap: 20px;
            backdrop-filter: blur(10px);
        }
        .nav-btn {
            color: white; text-decoration: none; padding: 10px 20px;
            border-radius: 25px; background: rgba(255, 255, 255, 0.2);
            font-weight: bold; transition: 0.3s;
        }
        .nav-btn:hover { background: white; color: #764ba2; }
        .container {
            background: white; margin-top: 50px; padding: 40px;
            border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 800px; width: 90%; text-align: center;
        }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-top: 30px;
        }
        .card {
            padding: 20px; border: 1px solid #eee; border-radius: 15px;
        }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/dashboard" class="nav-btn">Inicio</a>
        <a href="/usecase1" class="nav-btn">Predicción Vivienda</a>
        <a href="/usecase4" class="nav-btn">Riesgo Académico</a>
    </div>
    <div class="container">
        <h1>Sistema Predictivo Académico</h1>
        <p>Bienvenido. Selecciona una opción para comenzar el análisis.</p>
        <div class="grid">
            <div class="card">
                <img src="https://via.placeholder.com/150" alt="ML">
                <h3>Machine Learning</h3>
                <p>Modelos de regresión lineal.</p>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/150" alt="IA">
                <h3>Analítica</h3>
                <p>Predicciones en tiempo real.</p>
            </div>
        </div>
    </div>
</body>
</html>
